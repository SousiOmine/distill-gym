version: 1

run:
  name: metasia-run
  task_count: 3
  concurrency: 1
  timeout_minutes_per_task: 30
  cleanup: always

provider:
  type: openai_compatible
  name: deepinfra
  base_url: https://api.deepinfra.com/v1/openai
  api_key_env: DEEPINFRA_API_KEY
  model: example-model
  extra_body: {}

logging_proxy:
  listen_host: 127.0.0.1
  listen_port: 5002
  capture_stream_chunks: true
  capture_raw_request: true
  capture_raw_response: true
  normalize_reasoning: true

sandbox:
  type: git_repository
  engine: podman
  repo_url: https://github.com/SousiOmine/Metasia
  ref: master
  image: mcr.microsoft.com/dotnet/sdk:10.0
  workdir: /workspace/repo
  setup:
    - apt-get update && apt-get install -y nodejs npm
  volumes:
    - type: cache
      name: nuget
      target: /root/.nuget/packages
  network:
    mode: proxy_only
  env:
    OPENAI_BASE_URL: http://host.containers.internal:5002/v1
    OPENAI_API_KEY: dummy-key

harness:
  type: opencode
  install:
    strategy: command
    commands:
      - npm install -g opencode-ai
  run:
    command: opencode run "{task.prompt}"
  completion:
    success_exit_codes: [0]
    max_idle_seconds: 120

taskgen:
  type: repo_auto
  prompt_template: repo_bugfix_and_test_tasks

artifacts:
  collect:
    - git_diff
    - stdout
    - stderr
    - test_results
    - files_changed

export:
  formats:
    - openai_messages_jsonl
  include_reasoning_content: true
  include_tool_results: true
  include_failed_runs: false
