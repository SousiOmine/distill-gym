version: 1

run:
  name: app_idea_generation
  task_count: 3
  concurrency: 1
  timeout_minutes_per_task: 30
  cleanup: always

provider:
  type: openai_compatible
  name: deepinfra
  base_url: https://api.deepinfra.com/v1/openai
  api_key_env: DEEPINFRA_API_KEY
  model: example-model
  extra_body: {}

logging_proxy:
  listen_host: 127.0.0.1
  listen_port: 5002
  capture_stream_chunks: true
  capture_raw_request: true
  capture_raw_response: true
  normalize_reasoning: true

sandbox:
  type: custom
  engine: podman
  image: docker.io/library/python:3.12-bookworm
  workdir: /workspace
  steps:
    - type: run
      args:
        command: apt-get update -qq && apt-get install -y -qq nodejs npm
  network:
    mode: proxy_only

harness:
  type: opencode
  install:
    strategy: command
    commands:
      - npm install -g opencode-ai
  run:
    command: opencode run --format json {task.prompt.shell}
  completion:
    success_exit_codes: [0]
    max_idle_seconds: 120

taskgen:
  type: harness
  output_file: .distill-gym/taskgen/tasks.json
  batch_size: 3
  max_rounds: 6
  harness:
    type: opencode
    install:
      strategy: command
      commands:
        - npm install -g opencode-ai
    run:
      command: opencode run --format json {task.prompt.shell}
    completion:
      success_exit_codes: [0]
      max_idle_seconds: 120
  prompts:
    - id: app_idea
      title: Pythonアプリ案の生成
      prompt: |
        空のワークスペースで1つの.pyファイルとして実装可能な、
        クリエイティブでシンプルなPythonアプリケーション案を{batch_size}個生成してください。
        各案は以下のJSON形式で返してください：
        - id: 短いkebab-case識別子（例："weather-cli"）
        - title: 簡潔なアプリ名
        - prompt: AIコーディングエージェント向けの詳細な手順。
          アプリの実装、実行、出力表示までのステップを含めること
        - test_command: アプリを実行するシェルコマンド（例："python app.py"）
        以下の既存タスクと重複しないようにしてください: {existing_tasks_json}
        JSON配列のみを{output_file}に書き込んでください。

artifacts:
  collect:
    - stdout
    - stderr
    - files_changed
    - test_results

export:
  formats:
    - openai_messages_jsonl
  include_reasoning_content: true
  include_tool_results: true
  include_failed_runs: false
